<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Authorization - TrustGLOBAL</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --admin-primary: #6366f1;
            --admin-bg: #0f172a;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--admin-bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.1) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 4rem;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
        }
        .brand-logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
            text-align: center;
            margin-bottom: 3rem;
            letter-spacing: -1px;
        }
        .brand-logo i {
            color: var(--admin-primary);
            filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.5));
        }
        .form-label {
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
            margin-bottom: 0.75rem;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 1.25rem;
            border-radius: 15px;
            color: #fff;
            font-weight: 500;
            transition: all 0.3s;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--admin-primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            color: #fff;
        }
        .input-group-text {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            border-radius: 15px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border: none;
            padding: 1.1rem;
            border-radius: 18px;
            font-weight: 800;
            letter-spacing: 0.5px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(79, 70, 229, 0.4);
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
        }
        .text-xs { font-size: 0.75rem; }
        .text-muted { color: rgba(255, 255, 255, 0.4) !important; }
        .form-check-input {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .form-check-input:checked {
            background-color: var(--admin-primary);
            border-color: var(--admin-primary);
        }
        .glow-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="glow-orb"></div>
        
        <div class="brand-logo">
            <i class="fa-solid fa-shield-halved me-3"></i> TrustAdmin
        </div>
        
        <div class="text-center mb-5">
            <h3 class="fw-800 text-white mb-2" style="letter-spacing: -0.5px;">Institutional Vault</h3>
            <p class="text-muted fw-600">Enter secure encryption keys for access</p>
        </div>

        <form action="index.html">
            <div class="mb-4">
                <label class="form-label text-xs fw-800 text-uppercase">Identification Code</label>
                <div class="input-group">
                    <span class="input-group-text border-end-0"><i class="fa-solid fa- fingerprints"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" placeholder="admin_identity" required>
                </div>
            </div>

            <div class="mb-5">
                <label class="form-label text-xs fw-800 text-uppercase">Private Security Key</label>
                <div class="input-group">
                    <span class="input-group-text border-end-0"><i class="fa-solid fa-key"></i></span>
                    <input type="password" class="form-control border-start-0 ps-0" placeholder="••••••••••••" required>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-5">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label text-xs fw-600 text-muted" for="remember">Keep session alive</label>
                </div>
                <a href="#" class="text-xs text-primary text-decoration-none fw-800">Root Assistance</a>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-4">Authorize Entrance</button>
            <div class="text-center">
                <p class="text-xs text-muted fw-500 mb-0"><i class="fa-solid fa-lock-keyhole me-1 opacity-50"></i> Standard End-to-End Encryption Active</p>
            </div>
        </form>
    </div>

</body>
</html>
